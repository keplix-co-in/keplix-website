<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/kep-icon.jpg.jpeg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keplix - Drive Smarter, Book Faster</title>
    <meta name="description" content="Revolutionary automotive service platform. Book, compare, and track auto services at your fingertips." />
    <meta name="keywords" content="automotive, car service, maintenance, keplix, vehicle care" />
    <script>
      // GitHub Pages SPA redirect restore
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          });
          window.history.replaceState(
            null, null,
            l.pathname.slice(0, -1) + decoded[0] +
            (decoded[1] ? '?' + decoded[1] : '') +
            l.hash
          );
        }
      }(window.location));
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
